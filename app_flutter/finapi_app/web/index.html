<!DOCTYPE html>
<html>
<head>
  <!-- 
    A tag base ajuda o navegador a entender onde os assets do Flutter estão.
    Não altere a variável $FLUTTER_BASE_HREF, o próprio compilador do Flutter preenche isso.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FinAI - Gerencie suas finanças com inteligência artificial.">

  <!-- Configurações para iOS (Apple Web App) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FinAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon que aparece na aba do navegador -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FinAI Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <!-- ESTILOS DA TELA DE CARREGAMENTO HTML -->
  <style>
    /* Removemos as margens e forçamos o fundo escuro imediatamente */
    body {
      background-color: #0A0F16;
      margin: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* Evita barras de rolagem desnecessárias */
    }

    /* Animação de rotação para o círculo */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Estilo do spinner com o seu verde esmeralda */
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1E293B; /* Cor base (AppColors.slate800) */
      border-top: 3px solid #10B981; /* Cor primária (AppColors.emeraldColor) */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }

    /* Estilo do texto */
    .loading-text {
      color: #64748B; /* AppColors.textMuted */
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <!-- ELEMENTOS VISUAIS QUE APARECEM ANTES DO FLUTTER CARREGAR -->
  <div class="loading-spinner"></div>
  <div class="loading-text">INICIANDO MOTOR FINAI...</div>

  <!-- 
    Script padrão de inicialização do Flutter Web.
    Este script carrega o main.dart.js e assume o controle do HTML quando termina.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
