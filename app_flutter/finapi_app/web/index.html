<!DOCTYPE html>
<html>
<head>
  <!-- 
    A tag base ajuda o navegador a entender onde os assets do Flutter estão.
    Não altere a variável $FLUTTER_BASE_HREF, o próprio compilador do Flutter preenche isso.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FinAI - Gerencie suas finanças com inteligência artificial.">

  <!-- Configurações para iOS (Apple Web App) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FinAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon que aparece na aba do navegador -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FinAI Dashboard</title>
  <link rel="manifest" href="manifest.json">

  <!-- ESTILOS DA TELA DE CARREGAMENTO HTML -->
  <style>
    /* Estilos do body mantidos para o fundo escuro antes do Flutter carregar */
    body {
      background-color: #0A0F16;
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- O Flutter web assumirá o controle da tela assim que carregar -->

  <!-- 
    Script padrão de inicialização do Flutter Web.
    Este script carrega o main.dart.js e assume o controle do HTML quando termina.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
